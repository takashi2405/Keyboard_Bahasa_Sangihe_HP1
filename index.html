<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Keyboard Bahasa Sangihe</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    padding:0;
    height:100dvh;
    overflow:hidden;
    background:#f0f2f5;
    font-family:"Noto Sans", Arial, sans-serif;
}

.container{
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding:6px;
    background:#fff;
    overflow:hidden;
}

h2{
    margin:0 0 6px 0;
    font-size:18px;
    text-align:center;
}

/* ===== TEXT AREA ===== */

#display{
    flex:1;
    width:100%;
    padding:10px;

    font-size:20px;

    border:2px solid #ccd0d5;
    border-radius:10px;

    overflow-y:auto;
    overflow-wrap:anywhere;

    resize:none;
    outline:none;

    caret-color:#000;

    -webkit-user-select:text;
    user-select:text;

    -webkit-touch-callout:default;
}

/* ===== ACTIONS ===== */

.actions{
    display:flex;
    gap:5px;
    margin:6px 0;
}

.action-btn{
    flex:1;
    height:38px;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:600;
    background:#e9ecef;
}

.copy-btn{
    background:#4dabf7;
    color:#fff;
}

/* ===== KEYBOARD ===== */

.keyboard{
    display:flex;
    flex-direction:column;
    gap:4px;
    margin-top:auto;
}

.row{
    display:grid;
    gap:4px;
}

.row10{
    grid-template-columns:repeat(10, 1fr);
}

.row6{
    grid-template-columns:1fr 1fr 2.2fr 0.8fr 1.4fr;
}

/* ===== KEYS ===== */

.key{
    height:43px;
    font-size:17px;
    font-weight:600;

    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:8px;

    background:#f8f9fa;
    border:1px solid #cfd4da;

    box-shadow:
        0 1px 2px rgba(0,0,0,0.12),
        0 2px 6px rgba(0,0,0,0.08);
}

.key:active{
    transform:scale(0.97);
}

.special{
    background:#dee2e6;
}

.lock{
    background:#228be6;
    color:#fff;
}

/* ===== FOOTER ===== */

.footer{
    margin-top:6px;
    font-size:10px;
    text-align:center;
    color:#666;
}

</style>
</head>

<body>

<div class="container">

<h2>Keyboard Bahasa Sangihe</h2>

<textarea id="display"></textarea>

<div class="actions">
    <button class="action-btn" id="clear">Hapus semua</button>
    <button class="action-btn copy-btn" id="copyAll">Salin semua</button>
</div>

<div class="keyboard">

<!-- ROW 1 -->
<div class="row row10">
<button class="key letter" data-low="́" data-upp="~">́</button>
<button class="key letter" data-low="-" data-upp="_">-</button>
<button class="key letter" data-low="=" data-upp="+">=</button>
<button class="key letter" data-low="[" data-upp="{">[</button>
<button class="key letter" data-low="]" data-upp="}">]</button>
<button class="key letter" data-low="\" data-upp="|">\</button>
<button class="key letter" data-low=";" data-upp=":">;</button>
<button class="key letter" data-low="'" data-upp='"'>'</button>
<button class="key letter" data-low="/" data-upp="?">/</button>
<button class="key special" id="back">⌫</button>
</div>

<!-- ROW 2 -->
<div class="row row10">
<button class="key letter" data-low="1" data-upp="!">1</button>
<button class="key letter" data-low="2" data-upp="@">2</button>
<button class="key letter" data-low="3" data-upp="#">3</button>
<button class="key letter" data-low="4" data-upp="$">4</button>
<button class="key letter" data-low="5" data-upp="%">5</button>
<button class="key letter" data-low="6" data-upp="^">6</button>
<button class="key letter" data-low="7" data-upp="&">7</button>
<button class="key letter" data-low="8" data-upp="*">8</button>
<button class="key letter" data-low="9" data-upp="(">9</button>
<button class="key letter" data-low="0" data-upp=")">0</button>
</div>

<!-- ROW 3 -->
<div class="row row10">
<button class="key letter" data-low="q" data-upp="Q">q</button>
<button class="key letter" data-low="w" data-upp="W">w</button>
<button class="key letter" data-low="e" data-upp="E">e</button>
<button class="key letter" data-low="r" data-upp="R">r</button>
<button class="key letter" data-low="t" data-upp="T">t</button>
<button class="key letter" data-low="y" data-upp="Y">y</button>
<button class="key letter" data-low="u" data-upp="U">u</button>
<button class="key letter" data-low="i" data-upp="I">i</button>
<button class="key letter" data-low="o" data-upp="O">o</button>
<button class="key letter" data-low="p" data-upp="P">p</button>
</div>

<!-- ROW 4 -->
<div class="row row10">
<button class="key letter" data-low="a" data-upp="A">a</button>
<button class="key letter" data-low="s" data-upp="S">s</button>
<button class="key letter" data-low="ĕ" data-upp="Ĕ">ĕ</button>
<button class="key letter" data-low="d" data-upp="D">d</button>
<button class="key letter" data-low="f" data-upp="F">f</button>
<button class="key letter" data-low="g" data-upp="G">g</button>
<button class="key letter" data-low="h" data-upp="H">h</button>
<button class="key letter" data-low="j" data-upp="J">j</button>
<button class="key letter" data-low="k" data-upp="K">k</button>
<button class="key letter" data-low="l" data-upp="L">l</button>
</div>

<!-- ROW 5 -->
<div class="row row10">
<button class="key letter" data-low="̣" data-upp="̣">◌&#803;</button>
<button class="key letter" data-low="z" data-upp="Z">z</button>
<button class="key letter" data-low="x" data-upp="X">x</button>
<button class="key letter" data-low="c" data-upp="C">c</button>
<button class="key letter" data-low="v" data-upp="V">v</button>
<button class="key letter" data-low="b" data-upp="B">b</button>
<button class="key letter" data-low="n" data-upp="N">n</button>
<button class="key letter" data-low="m" data-upp="M">m</button>
<button class="key letter" data-low="l᷊" data-upp="L᷊">l᷊</button>
<button class="key letter" data-low="," data-upp="<">,</button>
</div>

<!-- ROW 6 -->
<div class="row row6">

<button class="key special" id="shift">Shift</button>
<button class="key special" id="caps">Caps</button>

<button class="key" id="space">Space</button>

<button class="key letter" data-low="." data-upp=">">.</button>

<button class="key special" id="enter">Enter</button>

</div>

</div>

<div class="footer">
© 2026 Takashi NAKAGAWA [versi. 202605280344]
</div>

</div>

<script>

let shift = false;
let caps = false;

const display = document.getElementById("display");

/* OS keyboard suppression (keeps caret usable) */
display.addEventListener("focus", ()=>{
    setTimeout(()=>display.blur(), 0);
});

function isUpper(){
    return shift || caps;
}

function updateKeys(){

    const upper = isUpper();

    document.querySelectorAll(".letter").forEach(btn=>{
        btn.textContent = upper ? btn.dataset.upp : btn.dataset.low;
    });

    document.getElementById("shift").classList.toggle("lock", shift);
    document.getElementById("caps").classList.toggle("lock", caps);

    document.getElementById("space").textContent =
        upper ? "Tab" : "Space";
}

/* CORE INSERT */
function insertChar(char){

    const start = display.selectionStart;
    const end = display.selectionEnd;

    const val = display.value;

    display.value =
        val.slice(0, start) +
        char +
        val.slice(end);

    const pos = start + char.length;

    display.selectionStart = display.selectionEnd = pos;

    display.focus();
}

/* KEY INPUT */
function insert(btn){

    const char = isUpper() ? btn.dataset.upp : btn.dataset.low;

    insertChar(char);

    shift = false;
    updateKeys();
}

function backspace(){

    const start = display.selectionStart;
    const end = display.selectionEnd;

    if(start !== end){

        insertChar("");

    }else if(start > 0){

        const val = display.value;

        display.value =
            val.slice(0, start - 1) +
            val.slice(end);

        display.selectionStart =
        display.selectionEnd = start - 1;
    }

    display.focus();
}

function toggleShift(){
    shift = !shift;
    updateKeys();
}

function toggleCaps(){
    caps = !caps;
    updateKeys();
}

function insertSpace(){
    insertChar(isUpper() ? "\t" : " ");
    shift = false;
    updateKeys();
}

/* ACTIONS */
document.getElementById("clear").onclick = ()=>{
    display.value = "";
};

document.getElementById("copyAll").onclick = async ()=>{
    await navigator.clipboard.writeText(display.value);
};

/* EVENTS */
document.querySelectorAll(".letter").forEach(btn=>{
    btn.addEventListener("click", ()=>insert(btn));
});

document.getElementById("back").onclick = backspace;
document.getElementById("shift").onclick = toggleShift;
document.getElementById("caps").onclick = toggleCaps;
document.getElementById("space").onclick = insertSpace;

document.getElementById("enter").onclick = ()=>{
    insertChar("\n");
};

updateKeys();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Keyboard Bahasa Sangihe [versi 05280402]</title>

<style>

*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    height:100dvh;
    overflow:hidden;
    background:#f0f2f5;
    font-family:"Noto Sans", Arial, sans-serif;
}

.container{
    height:100dvh;
    display:flex;
    flex-direction:column;
    padding:6px;
    background:#fff;
}

h2{
    margin:0 0 6px 0;
    font-size:18px;
    text-align:center;
}

/* TEXTAREA */

#display{
    flex:1;
    width:100%;
    padding:10px;
    font-size:20px;

    border:2px solid #ccd0d5;
    border-radius:10px;

    overflow-y:auto;
    overflow-wrap:anywhere;

    resize:none;
    outline:none;

    caret-color:#000;

    -webkit-user-select:text;
    user-select:text;
}

/* ACTIONS */

.actions{
    display:flex;
    gap:5px;
    margin:6px 0;
}

.action-btn{
    flex:1;
    height:38px;
    border:none;
    border-radius:8px;
    font-weight:600;
    background:#e9ecef;
}

.copy-btn{
    background:#4dabf7;
    color:#fff;
}

/* KEYBOARD */

.keyboard{
    display:flex;
    flex-direction:column;
    gap:4px;
    margin-top:auto;
}

.row{
    display:grid;
    gap:4px;
}

.row10{ grid-template-columns:repeat(10, 1fr); }
.row6{ grid-template-columns:1fr 1fr 2.2fr 0.8fr 1.4fr; }

.key{
    height:43px;
    font-size:17px;
    font-weight:600;
    display:flex;
    align-items:center;
    justify-content:center;

    border-radius:8px;
    background:#f8f9fa;
    border:1px solid #cfd4da;

    box-shadow:0 1px 2px rgba(0,0,0,0.12);
}

.key:active{ transform:scale(0.97); }

.special{ background:#dee2e6; }
.lock{ background:#228be6; color:#fff; }

.footer{
    margin-top:6px;
    font-size:10px;
    text-align:center;
    color:#666;
}

</style>
</head>

<body>

<div class="container">

<h2>Keyboard Bahasa Sangihe</h2>

<textarea id="display"></textarea>

<div class="actions">
    <button class="action-btn" id="clear">Hapus semua</button>
    <button class="action-btn copy-btn" id="copyAll">Salin semua</button>
</div>

<div class="keyboard">

<!-- ROWS -->
<div class="row row10">
<button class="key letter" data-low="q" data-upp="Q">q</button>
<button class="key letter" data-low="w" data-upp="W">w</button>
<button class="key letter" data-low="e" data-upp="E">e</button>
<button class="key letter" data-low="r" data-upp="R">r</button>
<button class="key letter" data-low="t" data-upp="T">t</button>
<button class="key letter" data-low="y" data-upp="Y">y</button>
<button class="key letter" data-low="u" data-upp="U">u</button>
<button class="key letter" data-low="i" data-upp="I">i</button>
<button class="key letter" data-low="o" data-upp="O">o</button>
<button class="key letter" data-low="p" data-upp="P">p</button>
</div>

<div class="row row10">
<button class="key special" id="back">⌫</button>
<button class="key special" id="shift">Shift</button>
<button class="key special" id="caps">Caps</button>
<button class="key" id="space">Space</button>
<button class="key special" id="enter">Enter</button>
</div>

</div>

<div class="footer">© 2026</div>

</div>

<script>

let shift=false;
let caps=false;

const display=document.getElementById("display");

/* =========================
   OS KEYBOARD SUPPRESSION
   ========================= */
display.addEventListener("focus",()=>{
    setTimeout(()=>display.blur(),0);
});

/* =========================
   CARET SAFE FOCUS
   ========================= */
function restoreCaret(pos){
    display.focus({preventScroll:true});
    display.setSelectionRange(pos,pos);
}

/* =========================
   STATE
   ========================= */
function isUpper(){ return shift||caps; }

/* =========================
   INSERT CORE
   ========================= */
function insertChar(char){

    const start=display.selectionStart;
    const end=display.selectionEnd;

    const val=display.value;

    display.value=
        val.slice(0,start)+
        char+
        val.slice(end);

    const pos=start+char.length;

    restoreCaret(pos);
}

/* =========================
   KEY INPUT
   ========================= */
function insert(btn){
    const char=isUpper()?btn.dataset.upp:btn.dataset.low;
    insertChar(char);
    shift=false;
    updateKeys();
}

function backspace(){

    const start=display.selectionStart;
    const end=display.selectionEnd;

    if(start!==end){
        insertChar("");
        return;
    }

    if(start>0){
        const val=display.value;
        display.value=val.slice(0,start-1)+val.slice(end);
        restoreCaret(start-1);
    }
}

function toggleShift(){ shift=!shift; updateKeys(); }
function toggleCaps(){ caps=!caps; updateKeys(); }

function insertSpace(){ insertChar(" "); }

/* =========================
   UI UPDATE
   ========================= */
function updateKeys(){
    const upper=isUpper();
    document.querySelectorAll(".letter").forEach(b=>{
        b.textContent=upper?b.dataset.upp:b.dataset.low;
    });
}

/* =========================
   ACTIONS
   ========================= */
document.getElementById("clear").onclick=()=>{
    display.value="";
};

document.getElementById("copyAll").onclick=async()=>{
    await navigator.clipboard.writeText(display.value);
};

/* =========================
   EVENTS
   ========================= */
document.querySelectorAll(".letter").forEach(btn=>{
    btn.onclick=()=>insert(btn);
});

document.getElementById("back").onclick=backspace;
document.getElementById("shift").onclick=toggleShift;
document.getElementById("caps").onclick=toggleCaps;
document.getElementById("space").onclick=insertSpace;

document.getElementById("enter").onclick=()=>{
    insertChar("\n");
};

updateKeys();

</script>

</body>
</html>
